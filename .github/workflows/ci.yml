name: source-checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
        creator-types: ['3.8.6', '3.8']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Select Cocos Creator type definitions
        run: npm install --no-save --ignore-scripts @cocos/creator-types@${{ matrix.creator-types }}
      - name: Run source checks
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-node-${{ matrix.node }}-creator-${{ matrix.creator-types }}
          path: test-output.txt
          if-no-files-found: ignore
          retention-days: 3
